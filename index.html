let descontoPercentual = 0;

const tempoBloqueio = 60000; // 60 segundos

function podeEnviarPedido(){
    let ultimoPedido = localStorage.getItem("ultimoPedido");

    if(!ultimoPedido) return true;

    let agora = Date.now();
    let diferenca = agora - ultimoPedido;

        let restante = Math.ceil((tempoBloqueio - diferenca)/1000);
        alert("⚠️ Aguarde " + restante + " segundos para enviar outro pedido.");
        return false;
    }

    return true;
}

function registrarPedido(){

function gerarNumeroPedido() {
  const letras = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
  const numeros = "0123456789";
  const caracteres = letras + numeros;

  let codigo = "NYC-";

  for (let i = 0; i < 6; i++) {
    codigo += caracteres.charAt(Math.floor(Math.random() * caracteres.length));
  }

  return codigo;
}

function calcular(){

let valorOriginal = cash;

valorFinal = 0;

document.getElementById("valor").innerText = valorFinal.toFixed(2);

}

function somenteNumeros(input){
    input.value = input.value.replace(/\D/g, "");
}

function validarNomeCompleto(nome){
    nome = nome.trim();

    let partes = nome.split(" ").filter(p => p.length > 2);

    return partes.length >= 2;
}

/* ================= EMAIL ================= */

function validarEmail(email){
    const regex = /^[^\s@]+@(gmail\.com|hotmail\.com|outlook\.com|yahoo\.com)$/i;
    return regex.test(email);
}

function validarEmailVisual(input){
    const erro = document.getElementById("erroEmail");

    if(!validarEmail(input.value)){
        erro.innerText = "E-mail inválido!";
        input.classList.add("input-erro");

        input.classList.remove("input-erro");

/* ================= ID DISCORD ================= */

function validarIDDiscord(id){
    // Remove qualquer coisa que não seja número
    id = id.replace(/\D/g, "");

    // Discord ID real tem entre 17 e 20 dígitos numéricos
    if(!/^\d{17,20}$/.test(id)){
        return false;
    }

    return true;
}

/* ================= TELEFONE ================= */

function validarTelefone(numero){
    numero = numero.replace(/\D/g, ""); // remove tudo que não é número

    // aceita números com 10 ou 11 dígitos (Brasil)
    if(numero.length < 10 || numero.length > 11){
        return false;
    }

    return true;
}

function formatarTelefone(input){
    let v = input.value.replace(/\D/g,"").slice(0,11);

    if(v.length > 6){
        input.value = `(${v.slice(0,2)}) ${v.slice(2,7)}-${v.slice(7,11)}`;
    }
    else if(v.length > 2){
        input.value = `(${v.slice(0,2)}) ${v.slice(2)}`;
    }
    else if(v.length > 0){
        input.value = `(${v}`;
    }
    else{
        input.value = "";
    }
}

/* ================= CPF ================= */

function formatarCPF(input){
    let v = input.value.replace(/\D/g,"").slice(0,11);

    if(v.length > 9)
        input.value = `${v.slice(0,3)}.${v.slice(3,6)}.${v.slice(6,9)}-${v.slice(9,11)}`;
    else if(v.length > 6)
        input.value = `${v.slice(0,3)}.${v.slice(3,6)}.${v.slice(6)}`;
    else if(v.length > 3)
        input.value = `${v.slice(0,3)}.${v.slice(3)}`;
    else
        input.value = v;

    validarCPFVisual(input.value);
}

function validarCPF(cpf){
    cpf = cpf.replace(/\D/g,"");

    if(cpf.length !== 11) return false;
    if(/^(\d)\1+$/.test(cpf)) return false;

    let soma = 0;
    for(let i=0;i<9;i++){
        soma += parseInt(cpf.charAt(i)) * (10 - i);
    }

    let resto = (soma * 10) % 11;
    if(resto === 10 || resto === 11) resto = 0;
    if(resto !== parseInt(cpf.charAt(9))) return false;

    soma = 0;
    for(let i=0;i<10;i++){
        soma += parseInt(cpf.charAt(i)) * (11 - i);
    }

    resto = (soma * 10) % 11;
    if(resto === 10 || resto === 11) resto = 0;

    if(resto !== parseInt(cpf.charAt(10))) return false;

    return true;
}

function validarCPFVisual(cpf){
    const erro = document.getElementById("erroCPF");
    const campo = document.getElementById("cpf");

    if(cpf.length < 14){
        erro.innerText = "";
        campo.classList.remove("input-erro");
        return;
    }

    if(!validarCPF(cpf)){
        erro.innerText = "CPF inválido!";
        campo.classList.add("input-erro");
    }else{
        erro.innerText = "";
        campo.classList.remove("input-erro");
    }
}
