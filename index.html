<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Loja Oficial - Nova York City LTDA.</title>

<style>
body{
    margin:0;
    padding:0;
    font-family:Arial, sans-serif;
    background: url("logo.png") no-repeat center center fixed;
    background-size:cover;
    display:flex;
    align-items:center;
    justify-content:center;
    height:100vh;
}

.overlay{
    background:rgba(0,0,0,0.75);
    position:fixed;
    inset:0;
}

.container{
    position:relative;
    background:white;
    padding:40px;
    border-radius:12px;
    text-align:center;
    max-width:400px;
    box-shadow:0 10px 30px rgba(0,0,0,0.3);
    z-index:1;
}

h1{
    color:#1565c0;
    margin-bottom:10px;
}

.status{
    font-size:18px;
    color:red;
    font-weight:bold;
    margin:15px 0;
}

.aviso{
    font-size:14px;
    color:#555;
}

.botao{
    margin-top:20px;
    padding:12px;
    background:#1565c0;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-size:15px;
    width:100%;
}

.botao:hover{
    background:#0d47a1;
}
</style>
</head>

<body>

<div class="overlay"></div>

<div class="container">
    <h1>LOJA OFICIAL</h1>
    <h2>NOVA YORK CITY LTDA.</h2>

    <div class="status">
        🚧 Loja Temporariamente Indisponível
    </div>

    <p class="aviso">
        Estamos realizando manutenção ou atualização no sistema.<br><br>
        Voltaremos em breve!
    </p>

    <button class="botao" onclick="window.location.href='https://whatsapp.com/channel/0029VbC5wjr65yDJFJjkil0O'">
        Fique por dentro das atualizações
    </button>
</div>

</body>
</html>
