<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Loja Oficial - Nova York City LTDA.</title>

<style>
.topo{
    background:#1565c0;
    color:white;
    padding:15px;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:15px;
    font-size:20px;
    font-weight:bold;
}

.logo{
    width:60px;
    height:auto;
}

body::before{
    content:"";
    position:fixed;
    inset:0;
    background:rgba(255,255,255,0.88);
    z-index:-1;
}

header{
    background:#1565c0;
    color:white;
    padding:20px;
    text-align:center;
    font-size:24px;
    font-weight:bold;
}

.container{
    max-width:500px;
    margin:60px auto;
    padding:30px;
    border-radius:12px;
    box-shadow:0 5px 20px rgba(0,0,0,0.1);

    background: url("logo.png") no-repeat center center;
    background-size: 300px;
    background-color: rgba(255,255,255,0.96);
}

button{
    background:#1565c0;
    color:white;
    padding:12px;
    width:100%;
    border:none;
    border-radius:8px;
    font-size:16px;
    cursor:pointer;
}

button:hover{ background:#0d47a1; }

.total{
    font-size:18px;
    margin:15px 0;
    font-weight:bold;
    text-align:center;
}

.aviso{
    font-size:12px;
    color:#666;
    margin-top:10px;
    text-align:center;
}

.campo{ margin-bottom:15px; }

.campo label{
    display:block;
    font-weight:bold;
    margin-bottom:5px;
    font-size:14px;
    color:#333;
}

.campo input{
    width:100%;
    padding:12px;
    border:1px solid #ccc;
    border-radius:8px;
    font-size:15px;
}

.campo input:focus{
    border-color:#1565c0;
    outline:none;
    box-shadow:0 0 5px rgba(21,101,192,0.3);
}

.erro{
    color:red;
    font-size:12px;
    margin-top:4px;
}

.input-erro{
    border-color:red !important;
}
</style>
</head>

<body>

<header class="topo">
    <img src="logo.png" class="logo">
    <span>LOJA OFICIAL - NOVA YORK CITY LTDA.</span>
</header>

<div class="container">

<h1 style="text-align:center;">SHOPPING CASH</h1>
<p class="aviso">1 Real = 1 Cash (cash é a moeda vip da cidade)</p>

<h4>DADOS PESSOAIS:</h4>

<div class="campo">
<label>Nome Completo</label>
<input type="text" id="nomecompleto" placeholder="Informe o nome completo">
</div>

<div class="campo">
<label>ID do Discord</label>
<input type="text" id="iddiscord" placeholder="Informe seu id do discord"
oninput="somenteNumeros(this)" maxlength="20">
</div>

<div class="campo">
<label>E-mail</label>
<input type="email" id="email"
 placeholder="Informe seu email">
</div>

<div class="campo">
<label>CPF</label>
<input type="text" id="cpf" maxlength="14"
placeholder="000.000.000-00"
oninput="formatarCPF(this)">
<div id="erroCPF" class="erro"></div>
</div>

<div class="campo">
<label>Telefone</label>
<input type="text" id="telefone"
maxlength="15"
placeholder="(00) 00000-0000"
oninput="formatarTelefone(this)">
</div>

<h4>INFORMAÇÕES DO JOGO:</h4>

<div class="campo">
<label>Nick do Jogo</label>
<input type="text" id="nick"
 placeholder="Informe o seu nick">
</div>

<div class="campo">
<label>ID do Jogo</label>
<input type="text" id="idconta"
placeholder="Informe o seu id"
oninput="somenteNumeros(this)"
maxlength="10">
</div>

<div class="campo">
<label>Quantidade de Cash</label>
<input type="number" id="cash" oninput="calcular()"
placeholder="Informe a quantidade desejada">
</div>

<div class="total">Total a pagar: R$ <span id="valor">0</span></div>

<img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=https://whatsapp.com/channel/0029VbC5wjr65yDJFJjkil0O">

<p class="aviso">Escaneie o QRcode para acessar nosso Grupo do WhatsApp.</p>

<button onclick="comprar()">Enviar pedido</button>

</div>

<script>

const webhookURL = "https://discord.com/api/webhooks/1477744047991816193/jb9YgwaCPWRNdFgBTpgDbk7OvCLaP-PVy-IIoNgCd_iCzg1K1a5vB1aAQbsaWyn_nVut";

function calcular(){
    let cash = document.getElementById("cash").value;
    document.getElementById("valor").innerText = cash ? cash : 0;
}

function somenteNumeros(input){
    input.value = input.value.replace(/\D/g, "");
}

function validarIDDiscord(id){
    return id.length >= 17 && id.length <= 20;
}

/* ================= TELEFONE ================= */
function formatarTelefone(input){
    let v = input.value.replace(/\D/g,"").slice(0,11);

    if(v.length > 6){
        input.value = `(${v.slice(0,2)}) ${v.slice(2,7)}-${v.slice(7,11)}`;
    }
    else if(v.length > 2){
        input.value = `(${v.slice(0,2)}) ${v.slice(2)}`;
    }
    else if(v.length > 0){
        input.value = `(${v}`;
    }
    else{
        input.value = "";
    }
}

/* ================= CPF ================= */

function formatarCPF(input){
    let v = input.value.replace(/\D/g,"").slice(0,11);

    if(v.length > 9)
        input.value = `${v.slice(0,3)}.${v.slice(3,6)}.${v.slice(6,9)}-${v.slice(9,11)}`;
    else if(v.length > 6)
        input.value = `${v.slice(0,3)}.${v.slice(3,6)}.${v.slice(6)}`;
    else if(v.length > 3)
        input.value = `${v.slice(0,3)}.${v.slice(3)}`;
    else
        input.value = v;

    validarCPFVisual(input.value);
}

function validarCPF(cpf){
    cpf = cpf.replace(/\D/g,"");

    if(cpf.length !== 11) return false;

    if(/^(\d)\1+$/.test(cpf)) return false;

    let soma = 0;
    for(let i=0;i<9;i++){
        soma += parseInt(cpf.charAt(i)) * (10 - i);
    }

    let resto = (soma * 10) % 11;
    if(resto === 10 || resto === 11) resto = 0;
    if(resto !== parseInt(cpf.charAt(9))) return false;

    soma = 0;
    for(let i=0;i<10;i++){
        soma += parseInt(cpf.charAt(i)) * (11 - i);
    }

    resto = (soma * 10) % 11;
    if(resto === 10 || resto === 11) resto = 0;

    if(resto !== parseInt(cpf.charAt(10))) return false;

    return true;
}

function validarCPFVisual(cpf){
    const erro = document.getElementById("erroCPF");
    const campo = document.getElementById("cpf");

    if(cpf.length < 14){
        erro.innerText = "";
        campo.classList.remove("input-erro");
        return;
    }

    if(!validarCPF(cpf)){
        erro.innerText = "CPF inválido!";
        campo.classList.add("input-erro");
    }else{
        erro.innerText = "";
        campo.classList.remove("input-erro");
    }
}

/* ================= COMPRAR ================= */

function comprar(){

    let nomecompleto = document.getElementById("nomecompleto").value;
    let iddiscord = document.getElementById("iddiscord").value;
    let email = document.getElementById("email").value;
    let cpf = document.getElementById("cpf").value;
    let telefone = document.getElementById("telefone").value;
    let nick = document.getElementById("nick").value;
    let idconta = document.getElementById("idconta").value;
    let cash = document.getElementById("cash").value;

    if(!nomecompleto || !iddiscord || !email || !cpf || !telefone || !nick || !idconta || !cash){
        alert("ERRO: Preencha tudo antes do envio!");
        return;
    }

    if(!validarIDDiscord(iddiscord)){
        alert("ID do Discord inválido!");
        return;
    }

    if(!validarCPF(cpf)){
        alert("ERRO: CPF inválido! Coloque um CPF válido para proseguir com o pedido.");
        document.getElementById("cpf").classList.add("input-erro");
        return;
    }

    fetch(webhookURL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
            content:
            "💰 NOVO PEDIDO - NOVA YORK CITY RP\n\n" +
            "👤 Nick: " + nick + "\n" +
            "🆔 ID Conta: " + idconta + "\n" +
            "💵 Cash: " + cash + "\n" +
            "💰 Valor à pagar: R$ " + cash + "\n\n" +
            
            "🔐 DADOS DO COMPRADOR:"
            
            "👤 Nome Completo: ||" + nomecompleto + "||"
            "🤖 Discord: ||<@" + iddiscord + ">||\n" +
            "📧 Email: ||" + email + "||\n" +
            "🪪 CPF: ||" + cpf + "||\n" +
            "📞 Telefone: ||" + telefone + "||"
            
            "<@&>\n\n" +
        })
    });

    alert("Pedido solicitado com sucesso! Aguarde que a Staff retornará em seu privado.");
}

</script>
