<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Loja Oficial - Nova RolePlay LTDA.</title>

<style>
/* CONFIGURAÇÃO PARA CENTRALIZAR E TRAVAR A TELA */
html, body {
    height: 100%;
    margin: 0;
    padding: 0;
    overflow-x: hidden; 
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: sans-serif;
}

body {
    width: 100%;
    background: 
        linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.85)),
        url("logo.png") no-repeat center center fixed;
    background-size: cover;
    -webkit-user-select: none;
    -moz-user-select: none;
    -ms-user-select: none;
    user-select: none;
}

input {
    -webkit-user-select: text;
    -moz-user-select: text;
    -ms-user-select: text;
    user-select: text;
    font-size: 16px !important; 
}

.container {
    width: 90%;
    max-width: 450px;
    max-height: 95vh;
    overflow-y: auto;
    background: white; 
    padding: 25px;
    border-radius: 12px;
    border: 3px solid #1565c0;
    box-shadow: 0 5px 20px rgba(0,0,0,0.5);
    position: relative;
    box-sizing: border-box;
}

.logo-cidade {
    display: block;
    width: 60px;
    margin: 0 auto 10px auto;
    position: relative; 
}

.botoes{ display:flex; flex-direction:column; gap:12px; }
.botao-voltar-topo{ background:#9e9e9e; width:auto; padding:8px 15px; margin-bottom:15px; }
.botao-voltar-topo:hover{ background:#7a7a7a; }
.etapa-texto{ text-align:center; color:#555; font-size:14px; margin-bottom:15px; font-weight:bold; }
.redes-rodape { display: flex; justify-content: center; gap: 20px; margin-top: 20px; }
.redes-rodape img { width: 30px; height: 30px; cursor: pointer; transition: 0.2s; }

button{ background:#1565c0; color:white; padding:12px; width:100%; border:none; border-radius:8px; font-size:16px; cursor:pointer; font-weight: bold;}
button:hover{ background:#0d47a1; }

.total{ font-size:18px; margin:15px 0; font-weight:bold; text-align:center; }
.aviso{ font-size:12px; color:#666; margin-top:10px; text-align:center; }
.campo{ margin-bottom:15px; }
.campo label{ display:block; font-weight:bold; margin-bottom:5px; font-size:14px; color:#333; }
.campo input{ width:100%; padding:12px; border:1px solid #ccc; border-radius:8px; box-sizing: border-box; }
.campo input:focus{ border-color:#1565c0; outline:none; box-shadow:0 0 5px rgba(21,101,192,0.3); }
.erro{ color:red; font-size:12px; margin-top:4px; }
.input-erro{ border-color:red !important; }
</style>
</head>

<body>

<div class="container">
    <img src="logo.png" class="logo-cidade">
    <div id="etapaTexto" class="etapa-texto">Etapa 1 de 2</div>

    <h2 style="text-align:center; margin-top:0;">SHOPPING CASH</h2>
    <p class="aviso">1 Real = 1 Cash (moeda vip da cidade)</p>

    <div id="etapa1">
        <h4>DADOS PESSOAIS:</h4>
        <div class="campo">
            <label>Nome Completo</label>
            <input type="text" id="nomecompleto" placeholder="Informe o nome completo">
        </div>
        <div class="campo">
            <label>ID do Discord</label>
            <input type="text" id="iddiscord" placeholder="Informe seu id do discord" oninput="somenteNumeros(this)" maxlength="20">
        </div>
        <div class="campo">
            <label>E-mail</label>
            <input type="email" id="email" placeholder="Informe seu email" onblur="validarEmailVisual(this)">
            <div id="erroEmail" class="erro"></div>
        </div>
        <div class="campo">
            <label>CPF</label>
            <input type="text" id="cpf" maxlength="14" placeholder="000.000.000-00" oninput="formatarCPF(this)">
            <div id="erroCPF" class="erro"></div>
        </div>
        <div class="campo">
            <label>Telefone</label>
            <input type="text" id="telefone" maxlength="15" placeholder="(00) 00000-0000" oninput="formatarTelefone(this)">
        </div>
        <button onclick="proximaEtapa()">Próxima etapa</button>
    </div>

    <div id="etapa2" style="display:none;">
        <button type="button" class="botao-voltar-topo" onclick="voltarEtapa()">Voltar</button>
        <h4>INFORMAÇÕES DO JOGO:</h4>
        <div class="campo">
            <label>Nick do Jogo</label>
            <input type="text" id="nick" placeholder="Informe o seu nick">
        </div>
        <div class="campo">
            <label>ID do Jogo</label>
            <input type="text" id="idconta" placeholder="Informe o seu id" oninput="somenteNumeros(this)" maxlength="10">
        </div>
        <div class="campo">
            <label>Quantidade de Cash</label>
            <input type="number" id="cash" oninput="calcular()" placeholder="Informe a quantidade desejada">
        </div>
        <div class="campo">
            <label>Cupom de desconto</label>
            <input type="text" id="cupom" placeholder="Digite seu cupom">
            <div id="cupomMsg" style="font-size:12px;margin-top:5px;"></div>
        </div>
        <div class="total">Total a pagar: R$ <span id="valor">0</span></div>
        <div class="botoes">
            <button onclick="comprar()">Enviar pedido</button>
        </div>
        <p class="aviso">Redes Sociais NRP:</p>
        <div class="redes-rodape">
            <a href="https://discord.gg/KWsRxG93Mb" target="_blank"><img src="discord.png"></a>
            <a href="https://www.instagram.com/_novaroleplay_?igsh=MzlpOXc3ZnZyNHp2" target="_blank"><img src="insta.png"></a>
            <a href="https://www.youtube.com/channel/UC0ffghKEhJzXvJ3L3jnlUfw" target="_blank"><img src="yt.png"></a>
            <a href="https://whatsapp.com/channel/0029VbC5wjr65yDJFJjkil0O" target="_blank"><img src="whatsapp.png"></a>
        </div>
    </div>
</div>

<script>
    document.addEventListener('contextmenu', event => event.preventDefault());
    document.onkeydown = function(e) {
        if (e.ctrlKey && (e.keyCode === 83 || e.keyCode === 85 || e.keyCode === 73)) return false;
    };

    const webhookURL = "https://discord.com/api/webhooks/1477744047991816193/jb9YgwaCPWRNdFgBTpgDbk7OvCLaP-PVy-IIoNgCd_iCzg1K1a5vB1aAQbsaWyn_nVut";
    let config = { descontoGlobal: 0, cupons: [] };
    let cupons = [];
    let cupomValido = false;
    let descontoPercentual = 0;

    fetch("config.json")
    .then(res => res.json())
    .then(data => {
        config = data || {};
        cupons = config.cupons || [];
    })
    .catch(() => console.log("Config não carregou."));

    function proximaEtapa(){
        let nome = document.getElementById("nomecompleto").value;
        let discord = document.getElementById("iddiscord").value;
        let email = document.getElementById("email").value;
        let cpf = document.getElementById("cpf").value;
        let telefone = document.getElementById("telefone").value;

        if(!nome || !discord || !email || !cpf || !telefone){
            alert("Preencha todos os dados pessoais primeiro.");
            return;
        }
        if(!validarNomeCompleto(nome)) return alert("Digite seu nome completo!");
        if(!validarIDDiscord(discord)) return alert("ID do Discord inválido!");
        if(!validarEmail(email)) return alert("E-mail inválido!");
        if(!validarCPF(cpf)) return alert("CPF inválido!");
        
        let telLimpo = telefone.replace(/\D/g, "");
        if(telLimpo.length < 10) return alert("Digite um telefone válido!");

        document.getElementById("etapa1").style.display="none";
        document.getElementById("etapa2").style.display="block";
        document.getElementById("etapaTexto").innerText="Etapa 2 de 2";
    }

    function voltarEtapa(){
        document.getElementById("etapa1").style.display="block";
        document.getElementById("etapa2").style.display="none";
        document.getElementById("etapaTexto").innerText="Etapa 1 de 2";
    }

    function calcular(){
        let cash = parseFloat(document.getElementById("cash").value) || 0;
        let descontoTotal = descontoPercentual + (config.descontoGlobal || 0);
        let valorFinal = cash - (cash * (descontoTotal/100));
        document.getElementById("valor").innerText = Math.max(0, valorFinal).toFixed(2);
    }

    function somenteNumeros(input){ input.value = input.value.replace(/\D/g, ""); }
    function validarNomeCompleto(n){ return n.trim().split(" ").length >= 2; }
    function validarEmail(e){ return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(e); }
    function validarEmailVisual(input){
        const erro = document.getElementById("erroEmail");
        if(!validarEmail(input.value)){ erro.innerText = "E-mail inválido!"; input.classList.add("input-erro"); }
        else { erro.innerText = ""; input.classList.remove("input-erro"); }
    }
    function validarIDDiscord(id){ return /^\d{17,20}$/.test(id.replace(/\D/g, "")); }
    
    function formatarTelefone(input){
        let v = input.value.replace(/\D/g,"").slice(0,11);
        if(v.length >= 11) input.value = `(${v.slice(0,2)}) ${v.slice(2,7)}-${v.slice(7,11)}`;
        else if(v.length > 2) input.value = `(${v.slice(0,2)}) ${v.slice(2)}`;
        else if(v.length > 0) input.value = `(${v}`;
    }

    function formatarCPF(input){
        let v = input.value.replace(/\D/g,"").slice(0,11);
        if(v.length > 9) input.value = `${v.slice(0,3)}.${v.slice(3,6)}.${v.slice(6,9)}-${v.slice(9,11)}`;
        else if(v.length > 6) input.value = `${v.slice(0,3)}.${v.slice(3,6)}.${v.slice(6)}`;
        else if(v.length > 3) input.value = `${v.slice(0,3)}.${v.slice(3)}`;
        validarCPFVisual(input.value);
    }

    function validarCPF(cpf){
        cpf = cpf.replace(/\D/g,"");
        if(cpf.length !== 11 || /^(\d)\1+$/.test(cpf)) return false;
        let soma = 0, resto;
        for(let i=1; i<=9; i++) soma += parseInt(cpf.substring(i-1, i)) * (11 - i);
        resto = (soma * 10) % 11;
        if(resto === 10 || resto === 11) resto = 0;
        if(resto !== parseInt(cpf.substring(9, 10))) return false;
        soma = 0;
        for(let i=1; i<=10; i++) soma += parseInt(cpf.substring(i-1, i)) * (12 - i);
        resto = (soma * 10) % 11;
        if(resto === 10 || resto === 11) resto = 0;
        return resto === parseInt(cpf.substring(10, 11));
    }

    function validarCPFVisual(cpf){
        const erro = document.getElementById("erroCPF"), campo = document.getElementById("cpf");
        if(cpf.length >= 14 && !validarCPF(cpf)){ erro.innerText = "CPF inválido!"; campo.classList.add("input-erro"); }
        else { erro.innerText = ""; campo.classList.remove("input-erro"); }
    }

    function gerarNumeroPedido() { return "NRP-" + Math.random().toString(36).substr(2, 6).toUpperCase(); }

    document.getElementById("cupom").addEventListener("input", function(){
        let codigo = this.value.trim().toUpperCase();
        let msg = document.getElementById("cupomMsg");
        let cupom = cupons.find(c => c.code === codigo);

        if(!codigo){
            cupomValido = false;
            msg.innerText = "";
            descontoPercentual = 0;
            calcular();
            return;
        }

        if(!cupom){
            cupomValido = false;
            msg.innerText = "❌ Cupom inválido.";
            msg.style.color = "red";
            descontoPercentual = 0;
            calcular();
            return;
        }

        cupomValido = true;
        descontoPercentual = cupom.discount;
        msg.innerText = "✅ Cupom aplicado: "+cupom.discount+"% de desconto";
        msg.style.color = "green";
        calcular();
    });

    function comprar(){
        let cupomDigitado = document.getElementById("cupom").value.trim();
        
        // TRAVA DE CUPOM: Se digitou algo e o sistema marcou como inválido
        if(cupomDigitado !== "" && !cupomValido) {
            alert("❌ O cupom inserido é inválido. Remova ou corrija para enviar.");
            return;
        }

        let nome = document.getElementById("nomecompleto").value;
        let discord = document.getElementById("iddiscord").value;
        let email = document.getElementById("email").value;
        let cpf = document.getElementById("cpf").value;
        let telefone = document.getElementById("telefone").value;
        let nick = document.getElementById("nick").value;
        let idconta = document.getElementById("idconta").value;
        let cash = document.getElementById("cash").value;

        if(!nick || !idconta || !cash) return alert("Preencha os dados do jogo!");

        let pedidoID = gerarNumeroPedido();

        fetch(webhookURL, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                content: 
                "💙 **__NOVA ROLEPLAY - NOVO PEDIDO__**\n" +
                "📦 **ID DO PEDIDO:** `" + pedidoID + "`\n\n" +
                "👤 **NICK:** " + nick + " | **ID:** " + idconta + "\n" +
                "💵 **CASH:** " + cash + "\n" +
                "💰 **VALOR:** R$ " + document.getElementById("valor").innerText + "\n" +
                "🎟️ **CUPOM:** " + (cupomDigitado || "Nenhum") + "\n\n" +
                "**__🔐 DADOS DO COMPRADOR:__**\n" +
                "👤 **NOME:** ||" + nome + "||\n" +
                "🤖 **DISCORD:** ||<@" + discord + ">||\n" +
                "📧 **E-MAIL:** ||" + email + "||\n" +
                "🪪 **CPF:** ||" + cpf + "||\n" +
                "📞 **TEL:** ||" + telefone + "||\n\n" +
                "<@&1474052698121834506>"
            })
        });

        alert("✅Pedido enviado com sucesso!\n\n"+
          "📝ID DO PEDIDO: "+pedidoID+"\n"+
          " Guarde o ID do pedido, você irá precisar.");
}
</script>
</body>
</html>
